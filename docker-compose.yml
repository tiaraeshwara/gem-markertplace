version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gemvault_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gemvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gemvault_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gemvault}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gemvault}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gemvault_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./gem-backend
      dockerfile: Dockerfile
    container_name: gemvault_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./gem-backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gemvault}:${POSTGRES_PASSWORD:-gemvault_secret}@postgres:5432/${POSTGRES_DB:-gemvault}
      REDIS_URL: redis://redis:6379
      PORT: 4000
    ports:
      - '4000:4000'
    volumes:
      - ./gem-backend:/app
      - /app/node_modules

  client:
    build:
      context: ./gem-forntend
      dockerfile: Dockerfile
    container_name: gemvault_client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:80'

volumes:
  postgres_data:
